services:
  postgres:
    image: postgres:16
    container_name: th-platform-postgres
    environment:
      POSTGRES_DB: th_platform
      POSTGRES_USER: th
      POSTGRES_PASSWORD: th
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U th -d th_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    container_name: th-platform-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
